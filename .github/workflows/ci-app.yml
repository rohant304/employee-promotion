name: CI

on:
  
   push:

    branches: 
           - main

   pull_request:

    branches: 
           - main

jobs:
  build:
     runs-on: Ubuntu-latest
     steps:
         - name: Checkout Repositery
           uses: actions/Checkout@v4

         - name: setup pyhton
           uses: actions/setup-python@v5
           with:
             python-version: "3.10"

         - name: Install Dependencies

           run: |
            pip install -r requirements.txt
         - name: Train.Model
           run: |
            python src/train.py
         - name: Run Tests
           run: |
             pytest

